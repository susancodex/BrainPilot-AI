kind = "web"
previewPath = "/"
title = "BrainPilot AI - Web App"
version = "1.0.0"
id = "artifacts/brainpilot-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23630

[services.development]
run = "pnpm --filter @workspace/brainpilot-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brainpilot-web", "run", "build" ]
publicDir = "artifacts/brainpilot-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23630"
BASE_PATH = "/"
