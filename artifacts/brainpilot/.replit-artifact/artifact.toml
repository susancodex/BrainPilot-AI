kind = "web"
previewPath = "/v0"
title = "BrainPilot AI (Legacy)"
version = "1.0.0"
id = "artifacts/brainpilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/v0" ]
localPort = 25585

[services.development]
run = "PORT=25585 BASE_PATH=/v0/ pnpm --filter @workspace/brainpilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brainpilot", "run", "build" ]
publicDir = "artifacts/brainpilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25585"
BASE_PATH = "/v0/"
