services:
  - type: web
    name: brainpilot-api
    env: python
    buildCommand: pip install -r requirements/production.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: brainpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: brainpilot-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  - type: redis
    name: brainpilot-redis
    ipAllowList: []

  - type: worker
    name: brainpilot-celery
    env: python
    buildCommand: pip install -r requirements/production.txt
    startCommand: celery -A config.celery worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

databases:
  - name: brainpilot-db
    databaseName: brainpilot_db
    user: brainpilot
