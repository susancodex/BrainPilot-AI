################################################################
# BrainPilot AI — Render Free Blueprint
#
# Deploys:
#   • 1 free web service  (Django API + React SPA via WhiteNoise)
#   • 1 free PostgreSQL database
#
# No Redis / no Celery workers — tasks run eagerly (inline).
# Upgrade to starter plan + add the Redis + worker blocks
# from docs/ when you need background task processing.
#
# ── REQUIRED secrets — add in Render dashboard ────────────────
#   DJANGO_SECRET_KEY   → python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
#   GEMINI_API_KEY      → https://aistudio.google.com/app/apikey
#
# ── OPTIONAL secrets ──────────────────────────────────────────
#   GROQ_API_KEY        → https://console.groq.com/keys
#   OPENROUTER_API_KEY  → https://openrouter.ai/keys
#   EMAIL_HOST_PASSWORD → your SMTP app password
#
# ── DEPLOY STEPS ──────────────────────────────────────────────
#   1. Push this repo to GitHub
#   2. Render dashboard → New → Blueprint → select repo
#   3. Add the required secrets listed above
#   4. Click "Apply"  — Render does the rest automatically
################################################################

databases:
  - name: brainpilot-db
    databaseName: brainpilot_db
    user: brainpilot
    plan: free

services:

  # ── Web Service — Django API + React SPA ──────────────────────────────────
  - type: web
    name: brainpilot-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: bash build.sh

    startCommand: bash backend/run_prod.sh

    healthCheckPath: /api/v1/live/

    envVars:
      # ── Django ────────────────────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONPATH
        value: backend
      - key: DJANGO_SECRET_KEY
        sync: false                       # set manually in Render dashboard

      # ── Database (auto-wired from the free PostgreSQL above) ──────────────
      - key: DATABASE_URL
        fromDatabase:
          name: brainpilot-db
          property: connectionString

      # ── AI providers ──────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false                       # required — set in dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false                       # optional fallback
      - key: OPENROUTER_API_KEY
        sync: false                       # optional fallback

      # ── Free-tier tweaks ──────────────────────────────────────────────────
      # No Redis on free tier — run Celery tasks synchronously in-process.
      - key: CELERY_ALWAYS_EAGER
        value: "true"

      # ── Security / CORS ───────────────────────────────────────────────────
      # Render injects RENDER_EXTERNAL_HOSTNAME automatically; production.py
      # reads it so you don't need to set ALLOWED_HOSTS manually.
      # Set CORS_ALLOWED_ORIGINS after your first deploy if you use a custom
      # frontend domain.  Example: https://brainpilot.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "false"                    # Render terminates TLS upstream

      # ── Email (optional — console backend used if not set) ────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      # Set these in the dashboard only if you want real email delivery:
      # EMAIL_HOST_USER, EMAIL_HOST_PASSWORD, DEFAULT_FROM_EMAIL
      - key: DEFAULT_FROM_EMAIL
        value: noreply@brainpilot.ai

      # ── Misc ──────────────────────────────────────────────────────────────
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"                    # flip to true once email is wired up
