################################################################
# BrainPilot AI — Render Backend Blueprint
#
# Architecture:
#   Frontend  → Vercel          (React + Vite)
#   Backend   → Render (here)   (Django + DRF + Gunicorn)
#   Database  → Neon PostgreSQL (external — set DATABASE_URL below)
#
# ── REQUIRED secrets — add in Render dashboard ────────────────
#   DJANGO_SECRET_KEY      → python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
#   DATABASE_URL           → your Neon connection string (see neon.tech)
#   GEMINI_API_KEY         → https://aistudio.google.com/app/apikey
#
# ── REQUIRED after first deploy ───────────────────────────────
#   CORS_ALLOWED_ORIGINS   → https://your-app.vercel.app
#   CSRF_TRUSTED_ORIGINS   → https://your-app.vercel.app
#   FRONTEND_URL           → https://your-app.vercel.app
#
# ── OPTIONAL ──────────────────────────────────────────────────
#   GROQ_API_KEY           → https://console.groq.com/keys
#   OPENROUTER_API_KEY     → https://openrouter.ai/keys
#   EMAIL_HOST_USER        → your SMTP user
#   EMAIL_HOST_PASSWORD    → your SMTP app password
#
# ── DEPLOY STEPS ──────────────────────────────────────────────
#   1. Create a Neon database → copy the connection string
#   2. Push this repo to GitHub
#   3. Render dashboard → New → Blueprint → select repo
#   4. Add the required secrets listed above
#   5. Click "Apply"
################################################################

services:

  # ── Django REST API ───────────────────────────────────────────────────────────
  - type: web
    name: brainpilot-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: bash build.sh

    startCommand: bash backend/run_prod.sh

    healthCheckPath: /api/v1/live/

    envVars:
      # ── Django core ───────────────────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONPATH
        value: backend
      - key: DJANGO_SECRET_KEY
        sync: false                        # set manually in Render dashboard

      # ── Neon PostgreSQL ───────────────────────────────────────────────────────
      # Get this from your Neon project → Connection Details → Connection string
      # Format: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/brainpilot?sslmode=require
      - key: DATABASE_URL
        sync: false                        # set manually in Render dashboard

      # ── AI providers ──────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false                        # required
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false                        # optional fallback
      - key: OPENROUTER_API_KEY
        sync: false                        # optional fallback

      # ── CORS / CSRF — set to your Vercel URL after first deploy ───────────────
      # Example: https://brainpilot.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

      # ── Free-tier tweaks ──────────────────────────────────────────────────────
      # No Redis on free tier — Celery tasks run synchronously in-process
      - key: CELERY_ALWAYS_EAGER
        value: "true"

      # ── Security ──────────────────────────────────────────────────────────────
      - key: SECURE_SSL_REDIRECT
        value: "false"                     # Render terminates TLS upstream
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"                     # flip to true once email is configured

      # ── Email (optional) ──────────────────────────────────────────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: DEFAULT_FROM_EMAIL
        value: noreply@brainpilot.ai
      # Set EMAIL_HOST_USER and EMAIL_HOST_PASSWORD manually when ready
