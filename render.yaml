################################################################
# BrainPilot AI — Render Deployment Configuration
#
# Deploy steps:
#   1. Connect your GitHub repository in the Render dashboard
#   2. Select "Use Infrastructure as Code (render.yaml)"
#   3. Add the required secret environment variables listed below
#   4. Click Deploy
#
# Required secrets to add manually in the Render dashboard:
#   DJANGO_SECRET_KEY  — generate with:
#     python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
#   GEMINI_API_KEY     — from https://aistudio.google.com/apikey
#   GROQ_API_KEY       — from https://console.groq.com/keys  (optional fallback)
#   OPENROUTER_API_KEY — from https://openrouter.ai/keys     (optional fallback)
#   EMAIL_HOST_PASSWORD — SMTP app password
################################################################

databases:
  - name: brainpilot-db
    databaseName: brainpilot_db
    user: brainpilot
    plan: free

services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: brainpilot-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Backend API (Django + Gunicorn) ──────────────────────────────────────────
  # Django serves both the REST API and the React SPA (via serve_react in urls.py).
  # The frontend must be built before static file collection.
  - type: web
    name: brainpilot-api
    runtime: python
    region: oregon
    plan: starter

    buildCommand: |
      # Install Node.js + pnpm for frontend build
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
      npm install -g pnpm@latest
      # Build frontend
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/brainpilot-web run build
      # Install Python dependencies
      pip install uv
      uv pip install --system -r backend/requirements/production.txt
      # Collect static files & run migrations
      cd backend
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput

    startCommand: bash backend/run_prod.sh

    healthCheckPath: /api/v1/live/

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONPATH
        value: backend
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: brainpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: brainpilot-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: ""   # Optional; RENDER_EXTERNAL_HOSTNAME is added automatically in production settings
      - key: CORS_ALLOWED_ORIGINS
        value: ""   # Set to your frontend URL if hosting frontend separately
      - key: SECURE_SSL_REDIRECT
        value: "false"   # Render terminates TLS at the load balancer
      - key: FRONTEND_URL
        value: ""   # e.g. https://brainpilot.onrender.com
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: ""
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@brainpilot.ai
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: brainpilot-celery-worker
    runtime: python
    region: oregon
    plan: starter

    buildCommand: |
      pip install uv
      uv pip install --system -r backend/requirements/production.txt

    startCommand: |
      cd backend && celery -A config.celery worker \
        --loglevel=info \
        --concurrency=2 \
        --max-tasks-per-child=1000

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONPATH
        value: backend
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: brainpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: brainpilot-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  # ── Celery Beat (Cron) ────────────────────────────────────────────────────────
  - type: worker
    name: brainpilot-celery-beat
    runtime: python
    region: oregon
    plan: starter

    buildCommand: |
      pip install uv
      uv pip install --system -r backend/requirements/production.txt

    startCommand: |
      cd backend && celery -A config.celery beat \
        --loglevel=info \
        --schedule /tmp/celerybeat-schedule

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONPATH
        value: backend
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: brainpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: brainpilot-redis
          type: redis
          property: connectionString
